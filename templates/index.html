<!DOCTYPE html>
<html lang="en">
<head>
    <title>TransferDB - Login</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .flash { color: red; font-weight: bold; }
        section { margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>TransferDB</h1>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul class="flash">
        {% for message in messages %}
          <li>{{ message }}</li>
        {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <section>
        <h2>Login</h2>
        <form action="/login" method="POST">
            <label>Username:</label><br>
            <input type="text" name="username" required><br><br>
            <label>Password:</label><br>
            <input type="password" name="password" required><br><br>
            <button type="submit">Login</button>
        </form>
    </section>

    <hr>

    <section>
        <h2>Register New User</h2>
        <form action="/signup" method="POST">
            <label>Username:</label><br>
            <input type="text" name="username" required><br><br>
            
            <label>Role:</label><br>
            <select name="role">
                <option value="db_manager">Database Manager</option>
                <option value="player">Player</option>
                <option value="manager">Manager</option>
                <option value="referee">Referee</option>
            </select><br><br>

            <label>Name (leave blank if DB Manager):</label><br>
            <input type="text" name="name"><br><br>

            <label>Surname (leave blank if DB Manager):</label><br>
            <input type="text" name="surname"><br><br>

            <label>Nationality (leave blank if DB Manager):</label><br>
            <input type="text" name="nationality"><br><br>

            <label>Date of Birth (leave blank if DB Manager):</label><br>
            <input type="date" name="dob"><br><br>

            <label>Password:</label><br>
            <input type="password" name="password" required><br>
            <small>(Min 8 chars, 1 Upper, 1 Lower, 1 Digit, 1 Special)</small><br><br>
            
            <button type="submit">Sign Up</button>
        </form>
    </section>
</body>
</html>
